<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    <title>Barbearia Premium</title>
    <!-- Ícones do Navegador e Instalação no Celular (iOS/Android) -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    
    <!-- Google Fonts para Tipografia Premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet" />

    <!-- Estilo da Splash Screen de Alta Performance -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background-color: #020617; /* Slate 950 */
      }
      #splash-screen {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        z-index: 99999;
        font-family: 'Outfit', system-ui, -apple-system, sans-serif;
        color: #f8fafc;
      }
      .splash-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        max-width: 90%;
        animation: fadeIn 0.8s ease-out forwards;
      }
      .logo-wrapper {
        position: relative;
        width: 130px;
        height: 130px;
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 22%; /* Formato squircle idêntico ao do card metálico */
        border: 2px solid rgba(245, 158, 11, 0.35);
        box-shadow: 0 0 40px rgba(245, 158, 11, 0.25), inset 0 0 20px rgba(245, 158, 11, 0.1);
        overflow: hidden; /* Esconde os cantos brancos externos da imagem */
        animation: scalePulse 3s ease-in-out infinite;
      }
      .splash-logo {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scale(1.05); /* Zoom leve de 5% para cortar fora as arestas brancas do png */
      }
      .splash-title {
        font-size: 22px;
        font-weight: 800;
        letter-spacing: 0.25em;
        margin: 0 0 8px 0;
        background: linear-gradient(135deg, #f97316 0%, #fbbf24 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 2px 10px rgba(245, 158, 11, 0.15);
      }
      .splash-subtitle {
        font-size: 11px;
        font-weight: 400;
        letter-spacing: 0.3em;
        color: #94a3b8; /* slate-400 */
        margin: 0 0 32px 0;
        text-transform: uppercase;
      }
      .splash-progress-container {
        width: 160px;
        height: 4px;
        background: rgba(245, 158, 11, 0.1);
        border-radius: 9999px;
        overflow: hidden;
        position: relative;
      }
      .splash-progress-bar {
        position: absolute;
        height: 100%;
        width: 50%;
        background: linear-gradient(90deg, #f97316, #fbbf24, #f97316);
        border-radius: 9999px;
        animation: shimmerProgress 1.6s infinite ease-in-out;
        box-shadow: 0 0 8px rgba(245, 158, 11, 0.5);
      }
      
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes scalePulse {
        0%, 100% { 
          transform: scale(1); 
          box-shadow: 0 0 40px rgba(245, 158, 11, 0.15), inset 0 0 20px rgba(245, 158, 11, 0.05); 
        }
        50% { 
          transform: scale(1.05); 
          box-shadow: 0 0 50px rgba(245, 158, 11, 0.3), inset 0 0 25px rgba(245, 158, 11, 0.12); 
        }
      }
      @keyframes shimmerProgress {
        0% { left: -50%; }
        100% { left: 100%; }
      }
    </style>
  </head>
  <body>
    <div id="splash-screen">
      <div class="splash-content">
        <div class="logo-wrapper">
          <img src="/logo.png" alt="Barbearia Premium" class="splash-logo" onerror="this.style.display='none'" />
        </div>
        <h1 class="splash-title">BARBEARIA PREMIUM</h1>
        <p class="splash-subtitle">Estilo • Tradição • Excelência</p>
        <div class="splash-progress-container">
          <div class="splash-progress-bar"></div>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
